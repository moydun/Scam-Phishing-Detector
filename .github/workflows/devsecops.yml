name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  code-quality:
    name: Code Quality & Syntax Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Syntax & Lint Check
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  security-secret-scan:
    name: Secret Leakage & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for Exposed Secrets
        run: |
          echo "Running secret scanner validation..."
          # Simple check to prevent hardcoded API keys from being committed
          git log --pretty=format:%B -n 5 | grep -Ei "GEMINI_API_KEY\s*=\s*['\"][a-zA-Z0-9_\-]+['\"]" && {
            echo "::error::Критическая угроза безопасности: обнаружен захардкоженный API-ключ в истории коммитов! Пуш заблокирован."
            exit 1
          } || echo "Секретные ключи в коммитах не обнаружены. Проверка пройдена успешно."

  docker-build-verification:
    name: Production Docker Build Test
    runs-on: ubuntu-latest
    needs: [code-quality, security-secret-scan]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Backend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false

      - name: Verify Frontend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
