version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "5001:5000"
    env_file:
      - .env

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:5001
    depends_on:
      - backend
